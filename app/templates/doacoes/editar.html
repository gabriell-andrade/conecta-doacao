<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Doador - APAE Mogi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-arrow-left-short"></i> Voltar ao Início</a>
        </div>
    </nav>

    <main class="main-conteudo">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow-lg border-0 rounded-4">
                        <div class="card-header bg-transparent border-0 pt-4">
                            <h2 class="text-center fw-bold"><i class="bi bi-pencil-square me-2"></i>Editar Dados do Doador</h2>
                        </div>
                        <div class="card-body p-4">
                            <form method="POST">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nome *</label>
                                    <input type="text" name="nome" class="form-control" value="{{ doador.nome }}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">E-mail</label>
                                    <input type="email" name="email" class="form-control" value="{{ doador.email or '' }}">
                                </div>
                                <div class="row g-2">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">CEP</label>
                                        <input type="text" name="cep" class="form-control" value="{{ doador.cep or '' }}">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Número</label>
                                        <input type="text" name="numero" class="form-control" value="{{ doador.numero or '' }}">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Rua</label>
                                    <input type="text" name="rua" class="form-control" value="{{ doador.rua or '' }}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Complemento</label>
                                    <input type="text" name="complemento" class="form-control" value="{{ doador.complemento or '' }}">
                                </div>
                                <div class="row g-2">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Cidade</label>
                                        <input type="text" name="cidade" class="form-control" value="{{ doador.cidade or '' }}">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Estado</label>
                                        <input type="text" name="estado" class="form-control" value="{{ doador.estado or '' }}">
                                    </div>
                                </div>
                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-doador btn-lg">Salvar alterações</button>
                                    <a href="/doadores" class="btn btn-outline-secondary">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
