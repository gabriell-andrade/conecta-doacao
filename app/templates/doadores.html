<!DOCTYPE html>
<html>
<head>
    <title>Cadastro de Doadores</title>
</head>
<body>

    <h1>Cadastrar Doador</h1>

    <form method="POST">
        <input type="text" name="nome" placeholder="Nome" required><br><br>
        <input type="email" name="email" placeholder="Email"><br><br>

        <input type="text" id="cep" name="cep" placeholder="CEP"><br><br>
        <input type="text" id="rua" name="rua" placeholder="Rua"><br><br>
        <input type="text" id="cidade" name="cidade" placeholder="Cidade"><br><br>
        <input type="text" id="estado" name="estado" placeholder="Estado"><br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <hr>

    <h2>Lista de Doadores</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>CEP</th>
            <th>Rua</th>
            <th>Cidade</th>
            <th>Estado</th>
            <th>Ações</th>
        </tr>

        {% for d in doadores %}
        <tr>
            <td>{{ d.id }}</td>
            <td>{{ d.nome }}</td>
            <td>{{ d.email }}</td>
            <td>{{ d.cep }}</td>
            <td>{{ d.rua }}</td>
            <td>{{ d.cidade }}</td>
            <td>{{ d.estado }}</td>
            <td>
                <a href="/editar/{{ d.id }}">Editar</a> |
                <a href="/excluir/{{ d.id }}">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <script>
        document.getElementById("cep").addEventListener("blur", function () {
            let cep = this.value.replace(/\D/g, "");

            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(response => response.json())
                    .then(data => {
                        if (!data.erro) {
                            document.getElementById("rua").value = data.logradouro;
                            document.getElementById("cidade").value = data.localidade;
                            document.getElementById("estado").value = data.uf;
                        }
                    });
            }
        });
    </script>

</body>
</html>
