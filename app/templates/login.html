<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - APAE Mogi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-heart-fill text-warning fs-4 me-2"></i>
                <span class="fw-bold">APAE Mogi das Cruzes</span>
            </a>
        </div>
    </nav>

    <main class="main-conteudo d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 150px);">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-lg border-0 rounded-4">
                        <div class="card-header bg-transparent border-0 pt-4 text-center">
                            <i class="bi bi-box-arrow-in-right fs-1 text-primary"></i>
                            <h2 class="fw-bold mt-2">Acessar Sistema</h2>
                            <p class="text-muted">Faça login para cadastrar suas doações</p>
                        </div>
                        <div class="card-body p-4">
                            
                            {% if erro %}
                            <div class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                {{ erro }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                            {% endif %}
                            
                            <form method="POST">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">E-mail</label>
                                    <input type="email" name="email" placeholder="seuemail@exemplo.com" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Senha</label>
                                    <input type="password" name="senha" placeholder="Digite sua senha" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-doador w-100 py-2">
                                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                                </button>
                            </form>
                            <div class="text-center mt-4">
                                <p class="mb-0">Não tem conta? <a href="/cadastro" class="text-decoration-none">Cadastre-se</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape py-3">
        <div class="container text-center">
            <p class="mb-0 small">&copy; 2025 APAE Mogi das Cruzes</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
