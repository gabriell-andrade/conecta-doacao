<!DOCTYPE html>
<html>
<head>
    <title>Editar Doador</title>
</head>
<body>

    <h1>Editar Doador</h1>

    <form method="POST">

        <label>Nome:</label><br>
        <input type="text" name="nome" value="{{ doador.nome }}" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" value="{{ doador.email }}"><br><br>

        <label>CEP:</label><br>
        <input type="text" name="cep" value="{{ doador.cep }}"><br><br>

        <label>Rua:</label><br>
        <input type="text" name="rua" value="{{ doador.rua }}"><br><br>

        <label>Número:</label><br>
        <input type="text" name="numero" value="{{ doador.numero }}"><br><br>

        <label>Complemento:</label><br>
        <input type="text" name="complemento" value="{{ doador.complemento }}"><br><br>

        <label>Cidade:</label><br>
        <input type="text" name="cidade" value="{{ doador.cidade }}"><br><br>

        <label>Estado:</label><br>
        <input type="text" name="estado" value="{{ doador.estado }}"><br><br>

        <button type="submit">Salvar</button>

    </form>

</body>
</html>
